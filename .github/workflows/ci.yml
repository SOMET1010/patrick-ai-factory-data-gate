name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Lint, format & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (editable + dev)
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Pytest with coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  integration:
    name: End-to-end against PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: datagate_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e "."

      - name: Seed schema and read-only role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d datagate_ci -v ON_ERROR_STOP=1 -f .github/sql/ci-schema.sql

      - name: Verify a single contract (read-only user)
        env:
          # Read-only role created by the seed script. This is an ephemeral CI
          # database; no production credentials are ever used here.
          DATAGATE_DSN: "postgresql://datagate_ro:datagate_ro@localhost:5432/datagate_ci"
        run: |
          datagate verify contracts/example-users.yaml -o artifacts/data-gate-result.json
          echo "Exit code: $?"

      - name: Generate a contract, then verify a directory of contracts
        env:
          DATAGATE_DSN: "postgresql://datagate_ro:datagate_ro@localhost:5432/datagate_ci"
        run: |
          mkdir -p ci-contracts
          cp contracts/example-users.yaml ci-contracts/
          # generate must produce a contract that verifies clean (round-trip)
          datagate generate --schema public -o ci-contracts/generated.yaml
          # verify the whole directory at once (multi-contract)
          datagate verify ci-contracts -o artifacts/data-gate-directory.json
          echo "Directory verify exit code: $?"

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-gate-result
          path: artifacts/data-gate-*.json
