# Example contract demonstrating every supported check.
# The live PostgreSQL database is the source of truth; this file only declares
# what the schema is expected to contain.

version: 1
database: datagate_ci
schema: public

# Governance policy (optional). Uncomment to also fail on / warn about objects
# that exist in the database but are not declared below.
# settings:
#   unexpected_tables: warning
#   unexpected_columns: ignore

structure:
  - table: organizations
    columns:
      - name: id
        type: integer
        nullable: false
      - name: name
        type: text
        nullable: false
    primary_key: [id]

  - table: users
    columns:
      - name: id
        type: integer
        nullable: false
      - name: org_id
        type: integer
        nullable: false
      - name: email
        type: text
        nullable: false
      - name: created_at
        type: timestamp
        nullable: false
      - name: updated_at
        type: timestamp
    primary_key: [id]
    foreign_keys:
      - columns: [org_id]
        references_table: organizations
        references_columns: [id]
    indexes:
      - name: users_email_idx
        columns: [email]
        unique: true

# Governance rules: every audited table must expose these columns.
audit:
  - table: users
    required_columns: [created_at, updated_at]
